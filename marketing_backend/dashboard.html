<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>太平新光社群行銷後台</title>
<style>
  :root {
    --navy:#1f3864; --gold:#d4a574; --bg:#f6f7fb; --line:#e3e6ef;
    --ok:#2ea150; --warn:#e08c2a; --bad:#c14545; --gray:#6b7280;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Noto Sans TC','PingFang TC',sans-serif;background:var(--bg);color:#1a1c20}
  header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  header h1{font-size:18px;margin:0;font-weight:700}
  header .meta{font-size:13px;opacity:.85}
  nav{background:#fff;border-bottom:1px solid var(--line);padding:0 20px;display:flex;gap:4px;overflow-x:auto;white-space:nowrap}
  nav button{background:transparent;border:none;padding:14px 18px;cursor:pointer;font-size:14px;color:#444;border-bottom:3px solid transparent;font-weight:500}
  nav button.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700}
  nav button:hover{background:#f3f5fa}
  main{padding:20px;max-width:1400px;margin:0 auto}
  section{display:none}
  section.active{display:block}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px}
  .kpi .label{font-size:12px;color:var(--gray);margin-bottom:6px}
  .kpi .num{font-size:28px;font-weight:700;color:var(--navy)}
  .kpi .delta{font-size:12px;color:var(--ok);margin-top:4px}
  table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
  table th{background:#f0f2f8;padding:10px;text-align:left;font-weight:700;color:#333;border-bottom:2px solid var(--line)}
  table td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
  table tr:hover{background:#fafbfd}
  .pill{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600}
  .pill.待審{background:#fff4d9;color:#7a5a00}
  .pill.過{background:#dcf3e1;color:#1c6a30}
  .pill.退回{background:#fce0e0;color:#892020}
  .pill.草稿{background:#eee;color:#444}
  .pill.已排程{background:#dbeafe;color:#1e3a8a}
  .pill.已發布{background:#dcf3e1;color:#1c6a30}
  .pill.失敗{background:#fce0e0;color:#892020}
  .btn{background:var(--navy);color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
  .btn:hover{opacity:.9}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--navy)}
  .btn.danger{background:var(--bad)}
  .btn.gold{background:var(--gold);color:#fff}
  .btn-sm{padding:4px 10px;font-size:12px}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap}
  .preview{display:flex;gap:14px;align-items:flex-start}
  .preview img{width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  .preview .text{flex:1;min-width:0}
  .preview .topic{font-weight:700;color:var(--navy);margin-bottom:4px}
  .preview .platform{font-size:11px;color:var(--gray);margin-bottom:6px}
  .preview .copy{font-size:12px;color:#444;line-height:1.4;max-height:60px;overflow:hidden}
  .filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px}
  .badge-count{background:var(--bad);color:#fff;font-size:11px;padding:2px 7px;border-radius:9px;margin-left:6px}
  .empty{text-align:center;padding:60px;color:var(--gray)}
  .loading{text-align:center;padding:30px;color:var(--gray)}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:10px;padding:22px;max-width:520px;width:90%;max-height:80vh;overflow:auto}
  .modal h3{margin-top:0;color:var(--navy)}
  .modal label{display:block;font-size:12px;color:var(--gray);margin:10px 0 4px}
  .modal input,.modal textarea{width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit}
  .modal textarea{min-height:80px}
  .modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  @media(max-width:640px){
    .preview{flex-direction:column}
    .preview img{width:100%;max-width:200px}
  }
</style>
</head>
<body>
<header>
  <h1>太平新光社群行銷後台</h1>
  <div class="meta" id="header-meta">載入中...</div>
</header>

<nav>
  <button class="active" data-tab="approval">待審佇列 <span class="badge-count" id="badge-approval">0</span></button>
  <button data-tab="schedule">排程看板</button>
  <button data-tab="interactions">互動中心 <span class="badge-count" id="badge-unreplied">0</span></button>
  <button data-tab="insights">數據儀表</button>
  <button data-tab="bookings">預約管理 <span class="badge-count" id="badge-bookings">0</span></button>
  <button data-tab="rules">回覆規則</button>
</nav>

<main>
  <!-- ============= 待審佇列 ============= -->
  <section id="tab-approval" class="active">
    <div class="kpis">
      <div class="kpi"><div class="label">待審圖片</div><div class="num" id="kpi-img-pending">—</div></div>
      <div class="kpi"><div class="label">待審文案</div><div class="num" id="kpi-copy-pending">—</div></div>
      <div class="kpi"><div class="label">已排程</div><div class="num" id="kpi-scheduled">—</div></div>
      <div class="kpi"><div class="label">已發布</div><div class="num" id="kpi-posted">—</div></div>
    </div>
    <div class="filter-bar">
      <button class="btn gold" onclick="approveAll('image')">圖片全過</button>
      <button class="btn gold" onclick="approveAll('copy')">文案全過</button>
      <select id="filter-status" onchange="renderApproval()">
        <option value="all">全部狀態</option>
        <option value="待審">待審</option>
        <option value="過">已過</option>
        <option value="退回">退回</option>
      </select>
      <select id="filter-platform" onchange="renderApproval()">
        <option value="all">全部平台</option>
        <option value="IG">IG</option>
        <option value="FB">FB</option>
        <option value="Reels">Reels</option>
      </select>
      <button class="btn ghost" onclick="loadAll()">重新整理</button>
    </div>
    <div id="approval-list" class="loading">載入中...</div>
  </section>

  <!-- ============= 排程看板 ============= -->
  <section id="tab-schedule">
    <h2>未來 7 天排程</h2>
    <div id="schedule-list" class="loading">載入中...</div>
  </section>

  <!-- ============= 互動中心 ============= -->
  <section id="tab-interactions">
    <h2>最近 100 則留言/私訊</h2>
    <div id="interactions-list" class="loading">載入中...</div>
  </section>

  <!-- ============= 數據儀表 ============= -->
  <section id="tab-insights">
    <div class="kpis">
      <div class="kpi"><div class="label">7 天觸及</div><div class="num" id="ins-reach">—</div></div>
      <div class="kpi"><div class="label">7 天互動</div><div class="num" id="ins-eng">—</div></div>
      <div class="kpi"><div class="label">7 天發文數</div><div class="num" id="ins-posts">—</div></div>
      <div class="kpi"><div class="label">資料總筆</div><div class="num" id="ins-total">—</div></div>
    </div>
    <p style="color:var(--gray);font-size:13px">每日 23:00 自動快照。詳細圖表後續加上。</p>
  </section>

  <!-- ============= 預約管理 ============= -->
  <section id="tab-bookings">
    <h2>預約名單</h2>
    <div id="bookings-list" class="loading">載入中...</div>
  </section>

  <!-- ============= 回覆規則 ============= -->
  <section id="tab-rules">
    <h2>自動回覆規則</h2>
    <p style="color:var(--gray);font-size:13px">規則直接在 Sheet「自動回覆 Auto_Reply」分頁編輯，這裡顯示快照。</p>
    <div id="rules-list" class="loading">載入中...</div>
  </section>
</main>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">編輯文案</h3>
    <input type="hidden" id="modal-row-num">
    <label>主標</label>
    <input id="modal-headline">
    <label>內文</label>
    <textarea id="modal-body"></textarea>
    <label>Hashtags</label>
    <input id="modal-tags">
    <div class="actions">
      <button class="btn ghost" onclick="closeModal()">取消</button>
      <button class="btn" onclick="saveModal()">儲存</button>
    </div>
  </div>
</div>

<script>
let allQueue = [];
let allInteractions = [];
let allBookings = [];

// Tab switch
document.querySelectorAll('nav button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('section').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-' + b.dataset.tab).classList.add('active');
  });
});

function loadAll() {
  document.getElementById('header-meta').textContent = '載入中...';
  google.script.run
    .withSuccessHandler(d => { allQueue = d || []; renderApproval(); renderSchedule(); updateKPIs(); })
    .withFailureHandler(err => { showError('getQueueData', err); allQueue = []; renderApproval(); updateKPIs(); })
    .getQueueData();
  google.script.run
    .withSuccessHandler(d => { allInteractions = d || []; renderInteractions(); })
    .withFailureHandler(err => { showError('getInteractionsData', err); allInteractions = []; renderInteractions(); })
    .getInteractionsData();
  google.script.run
    .withSuccessHandler(d => { allBookings = d || []; renderBookings(); })
    .withFailureHandler(err => { showError('getBookingsData', err); allBookings = []; renderBookings(); })
    .getBookingsData();
  google.script.run
    .withSuccessHandler(d => { renderInsightsKPIs(d || {}); })
    .withFailureHandler(err => { showError('getInsightsKPIs', err); })
    .getInsightsKPIs();
}

function showError(fnName, err) {
  const msg = (err && (err.message || err.toString())) || '未知錯誤';
  console.error('[' + fnName + '] ' + msg, err);
  const meta = document.getElementById('header-meta');
  meta.textContent = '⚠️ ' + fnName + ' 失敗：' + msg;
  meta.style.color = '#ffd1d1';
  // 同時在主區顯示
  const mainList = document.getElementById('approval-list');
  if (mainList && mainList.classList.contains('loading')) {
    mainList.innerHTML = '<div class="empty" style="color:#c14545">⚠️ ' + fnName + ' 失敗<br>' + msg + '<br><br>請在 Apps Script 重新部署 Web App（帶上你刚新增的 marketing_dashboard.gs、dashboard.html）</div>';
  }
}

function updateKPIs() {
  const imgPend = allQueue.filter(r => r['圖片審核'] === '待審').length;
  const copyPend = allQueue.filter(r => r['文案審核'] === '待審').length;
  const scheduled = allQueue.filter(r => r['排程狀態'] === '已排程').length;
  const posted = allQueue.filter(r => r['排程狀態'] === '已發布').length;
  document.getElementById('kpi-img-pending').textContent = imgPend;
  document.getElementById('kpi-copy-pending').textContent = copyPend;
  document.getElementById('kpi-scheduled').textContent = scheduled;
  document.getElementById('kpi-posted').textContent = posted;
  document.getElementById('badge-approval').textContent = imgPend + copyPend;
  const unrep = allInteractions.filter(r => r['已回覆'] === false || r['已回覆'] === 'FALSE').length;
  document.getElementById('badge-unreplied').textContent = unrep;
  document.getElementById('badge-bookings').textContent = allBookings.filter(r => r['狀態'] === '新進').length;
  document.getElementById('header-meta').textContent = `共 ${allQueue.length} 列佇列、${allBookings.length} 預約 · ${new Date().toLocaleString('zh-TW')}`;
}

function renderApproval() {
  const status = document.getElementById('filter-status').value;
  const platform = document.getElementById('filter-platform').value;
  let rows = allQueue;
  if (status !== 'all') rows = rows.filter(r => r['圖片審核'] === status || r['文案審核'] === status);
  if (platform !== 'all') rows = rows.filter(r => String(r['平台']).indexOf(platform) >= 0);
  const container = document.getElementById('approval-list');
  if (rows.length === 0) { container.innerHTML = '<div class="empty">無資料</div>'; return; }

  let html = '<table><thead><tr><th style="width:280px">預覽</th><th>主題</th><th>排程</th><th>圖</th><th>文</th><th>狀態</th><th>操作</th></tr></thead><tbody>';
  for (const r of rows.slice(0, 80)) {
    const thumb = r['縮圖URL'] || '';
    html += `<tr>
      <td><div class="preview">
        <img src="${thumb}" loading="lazy" alt="">
        <div class="text">
          <div class="topic">${escape_(r['主題'])}</div>
          <div class="platform">${escape_(r['平台'])} · ${escape_(r['比例'])}</div>
          <div class="copy">${escape_(r['文案_主標'])}</div>
        </div>
      </div></td>
      <td>${escape_(r['asset_id'])}</td>
      <td>${escape_(r['排程日期'])}<br>${escape_(r['排程時間'])}</td>
      <td><span class="pill ${r['圖片審核']}">${r['圖片審核']}</span></td>
      <td><span class="pill ${r['文案審核']}">${r['文案審核']}</span></td>
      <td><span class="pill ${r['排程狀態']}">${r['排程狀態']}</span></td>
      <td><div class="row-actions">
        <button class="btn btn-sm" onclick="approveOne(${r._row},'image')">圖過</button>
        <button class="btn btn-sm" onclick="approveOne(${r._row},'copy')">文過</button>
        <button class="btn btn-sm ghost" onclick="openEdit(${r._row},'${escape_(r['文案_主標'])}','${escape_(r['文案_內文']).replace(/'/g,"\\'")}','${escape_(r['Hashtags']).replace(/'/g,"\\'")}')">改</button>
        <button class="btn btn-sm danger" onclick="rejectOne(${r._row})">退</button>
      </div></td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderSchedule() {
  const today = new Date(); today.setHours(0,0,0,0);
  const next7 = allQueue.filter(r => {
    const d = new Date(r['排程日期']);
    return d >= today && d < new Date(today.getTime() + 7 * 86400000);
  }).sort((a, b) => (a['排程日期'] + a['排程時間']).localeCompare(b['排程日期'] + b['排程時間']));

  if (next7.length === 0) { document.getElementById('schedule-list').innerHTML = '<div class="empty">未來 7 天無排程</div>'; return; }

  let html = '<table><thead><tr><th>日期</th><th>時間</th><th>平台</th><th>主題</th><th>狀態</th><th>連結</th></tr></thead><tbody>';
  for (const r of next7) {
    html += `<tr>
      <td>${escape_(r['排程日期'])}</td>
      <td>${escape_(r['排程時間'])}</td>
      <td>${escape_(r['平台'])}</td>
      <td>${escape_(r['主題'])}</td>
      <td><span class="pill ${r['排程狀態']}">${r['排程狀態']}</span></td>
      <td>${r['post_url'] ? '<a href="' + r['post_url'].split(' ')[0] + '" target="_blank">看</a>' : '—'}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('schedule-list').innerHTML = html;
}

function renderInteractions() {
  const container = document.getElementById('interactions-list');
  if (allInteractions.length === 0) { container.innerHTML = '<div class="empty">尚無互動紀錄</div>'; return; }
  let html = '<table><thead><tr><th>時間</th><th>平台</th><th>類型</th><th>用戶</th><th>內容</th><th>已回覆</th><th>標籤</th></tr></thead><tbody>';
  for (const r of allInteractions.slice().reverse()) {
    html += `<tr>
      <td>${escape_(r['時間'])}</td>
      <td>${escape_(r['平台'])}</td>
      <td>${escape_(r['類型'])}</td>
      <td>${escape_(r['user_name'])}</td>
      <td style="max-width:340px">${escape_(r['內容'])}</td>
      <td>${(r['已回覆'] === 'TRUE' || r['已回覆'] === true) ? '✓' : ''}</td>
      <td>${escape_(r['標籤'])}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderBookings() {
  const container = document.getElementById('bookings-list');
  if (allBookings.length === 0) { container.innerHTML = '<div class="empty">尚無預約</div>'; return; }
  let html = '<table><thead><tr><th>建立</th><th>家長</th><th>孩子</th><th>年級</th><th>電話</th><th>希望</th><th>狀態</th></tr></thead><tbody>';
  for (const r of allBookings.slice().reverse()) {
    html += `<tr>
      <td>${escape_(r['建立時間'])}</td>
      <td>${escape_(r['家長姓名'])}</td>
      <td>${escape_(r['孩子姓名'])}</td>
      <td>${escape_(r['孩子年級'])}</td>
      <td>${escape_(r['聯絡電話'])}</td>
      <td>${escape_(r['希望日期'])} ${escape_(r['希望時段'])}</td>
      <td><span class="pill 待審">${escape_(r['狀態'])}</span></td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderInsightsKPIs(d) {
  document.getElementById('ins-reach').textContent = (d.reach7d || 0).toLocaleString();
  document.getElementById('ins-eng').textContent = (d.eng7d || 0).toLocaleString();
  document.getElementById('ins-posts').textContent = d.posts || 0;
  document.getElementById('ins-total').textContent = d.total || 0;
}

function approveOne(rowNum, target) {
  google.script.run.withSuccessHandler(() => loadAll()).approveRow(rowNum, target);
}

function rejectOne(rowNum) {
  const reason = prompt('退回原因？');
  if (!reason) return;
  google.script.run.withSuccessHandler(() => loadAll()).rejectRow(rowNum, 'image', reason);
}

function approveAll(target) {
  if (!confirm(`確定要把所有「待審」${target === 'image' ? '圖片' : '文案'}改為「過」？`)) return;
  const pending = allQueue.filter(r => (target === 'image' ? r['圖片審核'] : r['文案審核']) === '待審');
  let done = 0;
  pending.forEach(r => {
    google.script.run.withSuccessHandler(() => {
      done++;
      if (done === pending.length) loadAll();
    }).approveRow(r._row, target);
  });
}

function openEdit(rowNum, headline, body, tags) {
  document.getElementById('modal-row-num').value = rowNum;
  document.getElementById('modal-headline').value = headline;
  document.getElementById('modal-body').value = body;
  document.getElementById('modal-tags').value = tags;
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function saveModal() {
  const rowNum = parseInt(document.getElementById('modal-row-num').value, 10);
  const h = document.getElementById('modal-headline').value;
  const b = document.getElementById('modal-body').value;
  const t = document.getElementById('modal-tags').value;
  google.script.run.withSuccessHandler(() => { closeModal(); loadAll(); }).updateCopyText(rowNum, h, b, t);
}

function escape_(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadAll();
</script>
</body>
</html>
